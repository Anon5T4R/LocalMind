name: Build & Release

# Push a tag like v0.2.0 to build + publish a GitHub Release.
# workflow_dispatch builds without publishing.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
            artifacts: release/*.exe
          - os: ubuntu-latest
            script: dist:linux
            artifacts: release/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      # Cache node_modules keyed by OS + lockfile.
      # node-llama-cpp ships large prebuilt binaries, so caching is critical.
      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache-nm
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: nm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      # The postinstall patch may not have run if we restored from cache.
      - name: Run postinstall patch
        run: node scripts/patch-deps.mjs

      # electron-builder on Linux needs fakeroot + rpm (AppImage uses squashfs tools
      # that builder downloads itself, but fakeroot is required for file ownership).
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get install -y fakeroot rpm

      - name: Build (${{ matrix.os }})
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Prevents node-llama-cpp from trying to compile from source on CI.
          npm_config_build_from_source: 'false'

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: localmind-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifacts }}
          generate_release_notes: true
