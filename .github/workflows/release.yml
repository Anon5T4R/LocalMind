name: Build & Release

# Builds Windows + Linux artifacts. Push a tag like v0.1.0 to also publish a Release.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
            artifacts: |
              release/*.exe
          - os: ubuntu-latest
            script: dist:linux
            artifacts: |
              release/*.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.os }}
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: taylormind-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: warn

      - name: Publish to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
